# configs/data/fl_iid.yaml
#
# IID random partition across a fixed number of simulated clients.
# Use: python train_fl.py data=fl_iid
#
# The training set is shuffled once and split evenly; each client's class
# distribution mirrors the global distribution (IID assumption).

mode: fl_iid

dataset_path: "/home/filip/projects/fedhetnet/datasets/awid3_ds.sh"

class_sampling: [1, 1, 1, 1, 1, 1, 0]

# ── Topology ──────────────────────────────────────────────────────────────
n_clients: 10
clients_per_round: 3

# ── Schedule ──────────────────────────────────────────────────────────────
n_rounds: 2000
local_epochs: 1 # local SGD epochs each selected client runs

# ── Optimisers ────────────────────────────────────────────────────────────
client_lr: 0.001
client_momentum: 0.0
server_lr: 0.01
