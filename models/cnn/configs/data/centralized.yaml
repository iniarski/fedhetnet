# configs/data/centralized.yaml
#
# Full dataset, single client – equivalent to standard SGD.
# Use: python train_fl.py data=centralized
#
# n_rounds maps 1-to-1 to steps from the original centralised script.
# clients_per_round is fixed at 1 (the single client holding all data).

mode: centralized

dataset_path: "/home/filip/projects/fedhetnet/datasets/awid3_ds.sh"

class_sampling: [1, 1, 1, 1, 1, 1, 1]

# ── Schedule ──────────────────────────────────────────────────────────────
n_rounds: 20000
val_freq: 200

# ── Optimisers ────────────────────────────────────────────────────────────
# server_lr is effectively unused because there is only one client (no
# aggregation difference); set it equal to client_lr to be safe.
client_lr: 0.001
client_momentum: 0.9
server_lr: 0.001
