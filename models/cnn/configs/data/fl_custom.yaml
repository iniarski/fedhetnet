# configs/data/fl_custom.yaml
#
# Each client loads its own independent dataset file – realistic silo FL.
# Use: python train_fl.py data=fl_custom
#
# Per-client overrides:
#   class_sampling  – if omitted, the top-level class_sampling is used
#   seq_len         – if omitted, train.seq_len from the main config is used

mode: fl_custom

# Validation data (shared, centralised evaluati

class_sampling: [1, 1, 1, 1, 1, 1, 1] # default; overridable per client

# ── Client definitions ────────────────────────────────────────────────────
clients:
  - id: 0
    path: "/home/winiarski/fedhetnet/datasets/awid3_ds.sh"
  - id: 1
    path: "/home/winiarski/fedhetnet/datasets/f_ds.sh"
  - id: 2
    path: "/home/winiarski/fedhetnet/datasets/inz_ds.sh"
  - id: 3
    path: "/home/winiarski/fedhetnet/datasets/awid2_f_trn.sh"
  - id: 4
    path: "/home/winiarski/fedhetnet/datasets/awid2_f_tst.sh"
  - id: 5
    path: "/home/winiarski/fedhetnet/datasets/awid2_r_trn.sh"
  - id: 6
    path: "/home/winiarski/fedhetnet/datasets/awid2_r_tst.sh"

# ── Topology ──────────────────────────────────────────────────────────────
clients_per_round: 3 # clients sampled per round

# ── Schedule ──────────────────────────────────────────────────────────────
n_rounds: 500
val_freq: 10
local_epochs: 1
